<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0e17" />
    <title>Alien Stack</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <div class="stage-wrap">
        <canvas id="game" width="300" height="600" aria-label="Playfield"></canvas>
        <div class="touch-move-layer" role="group" aria-label="Move horizontally">
          <div class="touch-move-inner">
            <button type="button" class="touch-move-btn" data-dir="-1" aria-label="Move left">◀</button>
            <button type="button" class="touch-move-btn" data-dir="1" aria-label="Move right">▶</button>
          </div>
        </div>
        <div id="overlay" class="overlay hidden">
          <p id="overlay-title" class="overlay-title">Game over</p>
          <p id="overlay-sub" class="overlay-sub"></p>
          <div id="overlay-leaderboard" class="overlay-leaderboard">
            <p id="overlay-lb-head" class="overlay-lb-head"></p>
            <ol id="overlay-lb-list" class="overlay-lb-list"></ol>
          </div>
          <button type="button" id="btn-restart" class="btn">Play again</button>
        </div>
      </div>
    </div>
    <script src="./game.js" defer></script>
  </body>
</html>
